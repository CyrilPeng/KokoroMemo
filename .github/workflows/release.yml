name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-backend:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: kokoromemo-server-x86_64-pc-windows-msvc.exe
          - os: ubuntu-22.04
            target: kokoromemo-server-x86_64-unknown-linux-gnu
          - os: macos-latest
            target: kokoromemo-server-aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install nuitka ordered-set zstandard

      - name: Stamp backend version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          python - <<PY
          from pathlib import Path
          version = "${version}"
          Path("app/_version.py").write_text(
              '"""Build-time version fallback for packaged binaries."""\n\n'
              f'__version__ = "{version}"\n',
              encoding="utf-8",
          )
          PY

      - name: Build with Nuitka
        run: |
          python -m nuitka --standalone --onefile \
            --assume-yes-for-downloads \
            --include-package=app \
            --include-package=uvicorn \
            --include-package=fastapi \
            --include-package=httpx \
            --include-package=lancedb \
            --include-package=pyarrow \
            --include-package=aiosqlite \
            --include-package=pydantic \
            --include-package=yaml \
            --include-package=websockets \
            --include-package=dotenv \
            --output-filename=${{ matrix.target }} \
            app/main.py
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.os }}
          path: ${{ matrix.target }}

  build-tauri:
    needs: build-backend
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            backend-artifact: backend-windows-latest
            binary-name: kokoromemo-server-x86_64-pc-windows-msvc.exe
            rust-target: x86_64-pc-windows-msvc
            system: Windows
            arch: x64
            asset-kind: portable
          - os: ubuntu-22.04
            backend-artifact: backend-ubuntu-22.04
            binary-name: kokoromemo-server-x86_64-unknown-linux-gnu
            rust-target: x86_64-unknown-linux-gnu
            system: Linux
            arch: x64
            asset-kind: appimage
          - os: macos-latest
            backend-artifact: backend-macos-latest
            binary-name: kokoromemo-server-aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
            system: macOS
            arch: arm64
            asset-kind: app

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf libappindicator3-dev

      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.backend-artifact }}
          path: gui/src-tauri/binaries/

      - name: Prepare embedded backend (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $backendSource = 'gui/src-tauri/binaries/${{ matrix.binary-name }}'
          New-Item -ItemType Directory -Force gui/src-tauri/embedded-backend | Out-Null
          Copy-Item $backendSource gui/src-tauri/embedded-backend/kokoromemo-server.exe -Force
          Remove-Item $backendSource -Force

      - name: Make backend executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x gui/src-tauri/binaries/${{ matrix.binary-name }}

      - name: Install frontend deps
        working-directory: gui
        run: npm install

      - name: Build frontend (for Web UI dist)
        working-directory: gui
        run: npm run build

      - name: Build Windows single-exe app and MSI
        if: runner.os == 'Windows'
        working-directory: gui
        run: npm run tauri build -- --target ${{ matrix.rust-target }} --bundles msi --ci --config src-tauri/tauri.windows.conf.json

      - name: Build Linux AppImage
        if: runner.os == 'Linux'
        working-directory: gui
        run: npm run tauri build -- --target ${{ matrix.rust-target }} --bundles appimage --ci

      - name: Build macOS app
        if: runner.os == 'macOS'
        working-directory: gui
        run: npm run tauri build -- --target ${{ matrix.rust-target }} --bundles app --ci

      - name: Package Windows Portable.zip and MSI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $assetDir = Join-Path $PWD 'release-assets'
          $folderName = "KokoroMemo-$version-Windows-Portable"
          $folderPath = Join-Path $assetDir $folderName
          New-Item -ItemType Directory -Force $folderPath | Out-Null

          $mainExe = "gui/src-tauri/target/${{ matrix.rust-target }}/release/kokoromemo-gui.exe"
          if (!(Test-Path $mainExe)) {
            $mainExe = 'gui/src-tauri/target/release/kokoromemo-gui.exe'
          }
          Copy-Item $mainExe (Join-Path $folderPath 'KokoroMemo.exe') -Force

          $portableFiles = @(Get-ChildItem $folderPath -File -Recurse)
          if ($portableFiles.Count -ne 1 -or $portableFiles[0].Name -ne 'KokoroMemo.exe') {
            throw "Windows Portable.zip must contain only KokoroMemo.exe"
          }

          Compress-Archive -Path $folderPath -DestinationPath (Join-Path $assetDir "KokoroMemo-$version-Windows-Portable.zip") -Force
          Remove-Item -Recurse -Force $folderPath

          $msiDir = "gui/src-tauri/target/${{ matrix.rust-target }}/release/bundle/msi"
          if (!(Test-Path $msiDir)) {
            $msiDir = 'gui/src-tauri/target/release/bundle/msi'
          }
          $msi = Get-ChildItem $msiDir -Filter '*.msi' | Select-Object -First 1
          if (!$msi) {
            throw "No MSI asset found under $msiDir"
          }
          Copy-Item $msi.FullName (Join-Path $assetDir "KokoroMemo-$version-Windows-${{ matrix.arch }}.msi") -Force

      - name: Package Web UI dist (gui/dist)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $assetDir = Join-Path $PWD 'release-assets'
          New-Item -ItemType Directory -Force $assetDir | Out-Null
          Compress-Archive -Path 'gui/dist' -DestinationPath (Join-Path $assetDir "KokoroMemo-$version-WebUI-dist.zip") -Force

      - name: Rename Unix bundle asset
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          asset_dir="release-assets"
          mkdir -p "$asset_dir"

          bundle_dir="gui/src-tauri/target/${{ matrix.rust-target }}/release/bundle"
          if [[ ! -d "$bundle_dir" ]]; then
            bundle_dir="gui/src-tauri/target/release/bundle"
          fi

          if [[ "${{ matrix.asset-kind }}" == "appimage" ]]; then
            source_asset="$(find "$bundle_dir" -name '*.AppImage' -type f | head -n 1)"
            target_asset="$asset_dir/KokoroMemo-$version-${{ matrix.system }}-${{ matrix.arch }}.AppImage"
            if [[ -z "$source_asset" ]]; then
              echo "No AppImage found under $bundle_dir" >&2
              exit 1
            fi
            cp "$source_asset" "$target_asset"
          else
            source_app="$(find "$bundle_dir" -name '*.app' -type d | head -n 1)"
            target_asset="$asset_dir/KokoroMemo-$version-${{ matrix.system }}-${{ matrix.arch }}.zip"
            if [[ -z "$source_app" ]]; then
              echo "No .app bundle found under $bundle_dir" >&2
              exit 1
            fi
            (cd "$(dirname "$source_app")" && zip -r -y "$OLDPWD/$target_asset" "$(basename "$source_app")")
          fi

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.system }}-${{ matrix.arch }}
          path: release-assets/*

  publish-release:
    needs:
      - build-tauri
      - build-android-packages
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Prepare release notes
        shell: bash
        run: |
          tag_commit="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          git log -1 --pretty=%B "$tag_commit" > release-notes.md

      - name: Generate update manifest
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          tag="${GITHUB_REF_NAME}"
          repo="${GITHUB_REPOSITORY}"
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          tag = os.environ["GITHUB_REF_NAME"]
          repo = os.environ["GITHUB_REPOSITORY"]
          asset_dir = Path("release-assets")
          github_base = f"https://github.com/{repo}/releases/download/{tag}"
          github_latest_base = f"https://github.com/{repo}/releases/latest/download"
          gitee_repo = os.environ.get("KOKOROMEMO_GITEE_REPOSITORY", repo)
          gitee_base = f"https://gitee.com/{gitee_repo}/releases/download/{tag}"
          gitee_latest_manifest = f"https://gitee.com/{gitee_repo}/raw/main/latest.json"

          platform_rules = [
              ("Windows-Portable.zip", "windows-portable-x64"),
              ("Windows-x64.msi", "windows-msi-x64"),
              ("Linux-x64.AppImage", "linux-appimage-x64"),
              ("macOS-arm64.zip", "macos-app-arm64"),
              ("Android-Termux-aarch64.tar.gz", "android-termux-aarch64"),
              ("Android-ProotUbuntu-aarch64.tar.gz", "android-prootubuntu-aarch64"),
              ("WebUI-dist.zip", "webui-dist"),
          ]

          assets = {}
          checksums = []
          for path in sorted(asset_dir.iterdir()):
              if not path.is_file() or path.name in {"latest.json", "SHA256SUMS.txt"}:
                  continue
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              checksums.append(f"{digest}  {path.name}")
              key = path.stem
              for suffix, platform_key in platform_rules:
                  if path.name.endswith(suffix):
                      key = platform_key
                      break
              github_url = f"{github_base}/{path.name}"
              assets[key] = {
                  "name": path.name,
                  "size": path.stat().st_size,
                  "sha256": digest,
                  "url": github_url,
                  "mirrors": [
                      {"name": "GitHub", "url": github_url},
                      {"name": "GitHub Proxy", "url": f"https://gh-proxy.org/{github_url}"},
                      {"name": "Gitee", "url": f"{gitee_base}/{path.name}"},
                  ],
              }

          manifest_url = f"{github_latest_base}/latest.json"
          manifest = {
              "schema_version": 1,
              "app": "KokoroMemo",
              "version": f"v{version}",
              "tag": tag,
              "mandatory": False,
              "release_url": f"https://github.com/{repo}/releases/tag/{tag}",
              "changelog_url": f"https://github.com/{repo}/releases/tag/{tag}",
              "manifest_mirrors": [
                  {"name": "GitHub", "url": manifest_url},
                  {"name": "GitHub Proxy", "url": f"https://gh-proxy.org/{manifest_url}"},
                  {"name": "Gitee", "url": gitee_latest_manifest},
              ],
              "assets": assets,
          }
          asset_dir.joinpath("SHA256SUMS.txt").write_text("\n".join(checksums) + "\n", encoding="utf-8")
          asset_dir.joinpath("latest.json").write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          title="KokoroMemo $version"
          ls -la release-assets

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
            gh release edit "$GITHUB_REF_NAME" --title "$title" --notes-file release-notes.md --draft=false --latest
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* --title "$title" --notes-file release-notes.md --latest
          fi

  build-android-packages:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Web UI dist
        working-directory: gui
        run: |
          npm install
          npm run build

      - name: Prepare Android packages
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          asset_dir="release-assets"
          mkdir -p "$asset_dir"

          make_package() {
            local runtime="$1"
            local script_dir="$2"
            local wheel_dir="$3"
            local package_name="KokoroMemo-$version-Android-$runtime-aarch64"
            local root="android-package/$package_name"

            rm -rf "$root"
            mkdir -p "$root/kokoromemo" "$root/webui" "$root/wheels/$wheel_dir"

            rsync -a \
              --exclude '.git' \
              --exclude '.github' \
              --exclude '.pytest_cache' \
              --exclude '.test_tmp' \
              --exclude '.test_dbs' \
              --exclude 'pytest_tmp' \
              --exclude 'gui/node_modules' \
              --exclude 'gui/dist' \
              --exclude 'gui/src-tauri/target' \
              --exclude 'release-assets' \
              --exclude 'android-package' \
              ./ "$root/kokoromemo/"

            cp -a gui/dist "$root/webui/dist"
            cp -a packaging/android/common/. "$root/"
            cp "packaging/android/$script_dir/install.sh" "$root/install.sh"
            cp config.example.yaml "$root/config.example.yaml"
            printf '%s\n' "$version" > "$root/VERSION"
            printf '%s\n' "$runtime" > "$root/ANDROID_RUNTIME"
            chmod +x "$root"/*.sh

            tar -czf "$asset_dir/$package_name.tar.gz" -C "android-package" "$package_name"
          }

          make_package "Termux" "termux" "termux-aarch64"
          make_package "ProotUbuntu" "proot-ubuntu" "proot-ubuntu-aarch64"

      - name: Upload Android release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-Android-aarch64
          path: release-assets/*
