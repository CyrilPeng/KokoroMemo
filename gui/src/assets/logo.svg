<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#131524" />
      <stop offset="100%" stop-color="#1F2338" />
    </linearGradient>

    <linearGradient id="heartGrad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#FF5ACD" />
      <stop offset="50%" stop-color="#BA55D3" />
      <stop offset="100%" stop-color="#7209B7" />
    </linearGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.1" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#7209B7" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- 圆角背景 -->
  <rect width="800" height="800" rx="120" fill="url(#bgGrad)" />

  <!-- Logo主体：心形 + 向量节点，整体居中上移幅度减小 -->
  <g transform="translate(0, 10)">

    <!-- 心形 -->
    <path d="M 400,530
             C 400,530 140,360 140,200
             C 140,90 260,70 330,130
             C 365,160 400,200 400,200
             C 400,200 435,160 470,130
             C 540,70 660,90 660,200
             C 660,360 400,530 400,530 Z"
          fill="url(#heartGrad)"
          filter="url(#dropShadow)" />

    <!-- 向量连接线 -->
    <g stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round">
      <line x1="400" y1="200" x2="250" y2="280" />
      <line x1="400" y1="200" x2="550" y2="280" />
      <line x1="250" y1="280" x2="320" y2="390" />
      <line x1="550" y1="280" x2="480" y2="390" />
      <line x1="320" y1="390" x2="480" y2="390" />
      <line x1="320" y1="390" x2="400" y2="470" />
      <line x1="480" y1="390" x2="400" y2="470" />
      <line x1="400" y1="200" x2="400" y2="300" stroke-dasharray="6 6" />
      <line x1="250" y1="280" x2="190" y2="200" stroke-width="2" stroke-opacity="0.5" />
      <line x1="550" y1="280" x2="610" y2="200" stroke-width="2" stroke-opacity="0.5" />
    </g>

    <!-- 数据节点 -->
    <g fill="#FFFFFF" filter="url(#glow)">
      <circle cx="400" cy="200" r="10" />
      <circle cx="250" cy="280" r="8" />
      <circle cx="550" cy="280" r="8" />
      <circle cx="320" cy="390" r="8" />
      <circle cx="480" cy="390" r="8" />
      <circle cx="400" cy="470" r="6" />
      <circle cx="190" cy="200" r="4" fill-opacity="0.7"/>
      <circle cx="610" cy="200" r="4" fill-opacity="0.7"/>
      <circle cx="400" cy="300" r="5" fill-opacity="0.9"/>
    </g>

    <!-- 装饰闪星 -->
    <path d="M 600,100 Q 610,130 640,140 Q 610,150 600,180 Q 590,150 560,140 Q 590,130 600,100 Z"
          fill="#FFFFFF"
          filter="url(#glow)"
          opacity="0.8" />
    <path d="M 220,100 Q 225,115 240,120 Q 225,125 220,140 Q 215,125 200,120 Q 215,115 220,100 Z"
          fill="#FFFFFF"
          opacity="0.6" />
  </g>

  <!-- 文字区域 -->
  <g transform="translate(400, 650)">
    <text x="0" y="0"
          text-anchor="middle"
          fill="#FFFFFF"
          font-family="'Segoe UI', -apple-system, Roboto, sans-serif"
          font-size="52"
          font-weight="800"
          letter-spacing="2">
      KokoroMemo
    </text>
    <text x="0" y="70"
          text-anchor="middle"
          fill="#FFFFFF"
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="58"
          font-weight="700"
          letter-spacing="12">
      心 忆
    </text>
  </g>
</svg>
